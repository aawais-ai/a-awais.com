<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- DUPLICATE THIS FILE for each post. Rename to e.g. my-post-slug.html,
     edit the <title>, the <h1>, the date, and the body. Then add a link to it
     in the Writing section of /index.html. -->
<title>Post title — Awais Ahmed</title>
<meta name="description" content="One-line summary of the post." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  (function () {
    var saved = null;
    try { saved = localStorage.getItem('theme'); } catch (e) {}
    var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
  :root, [data-theme="dark"] { --bg:#0a0a0a; --bg-card:#141414; --text:#e5e5e5; --muted:#888; --dim:#555; --border:#222; }
  [data-theme="light"] { --bg:#fafafa; --bg-card:#fff; --text:#171717; --muted:#666; --dim:#a0a0a0; --border:#e4e4e4; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    font-size:16px; line-height:1.75; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:42rem; margin:0 auto; padding:56px 24px 96px; }
  a { color:var(--text); text-decoration:underline; text-underline-offset:3px; }
  .back { font-size:14px; color:var(--muted); text-decoration:none; display:inline-block; margin-bottom:44px; }
  .back:hover { color:var(--text); }
  h1 { font-weight:700; font-size:30px; line-height:1.25; margin:0 0 8px; letter-spacing:-0.02em; }
  .date { font-size:13px; color:var(--dim); margin:0 0 44px; }
  h2 { font-weight:600; font-size:20px; margin:40px 0 12px; letter-spacing:-0.01em; }
  p { margin:0 0 20px; color:var(--muted); }
  p b, p strong { color:var(--text); font-weight:600; }
  blockquote { margin:24px 0; padding-left:18px; border-left:2px solid var(--border); color:var(--muted); font-style:italic; }
  pre { background:var(--bg-card); border:1px solid var(--border); padding:16px; border-radius:8px; overflow:auto; font-size:13.5px; }
  code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:0.9em; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Awais Ahmed</a>
    <h1>Post title</h1>
    <p class="date">Month 2026</p>

    <p>Opening paragraph. Write the post here in plain HTML — one <code>&lt;p&gt;</code> per
    paragraph, <code>&lt;h2&gt;</code> for section headings.</p>

    <h2>A section</h2>
    <p>More text.</p>
  </div>
</body>
</html>
